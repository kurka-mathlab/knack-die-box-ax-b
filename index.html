<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Knack die Box – Terme entdecken</title>

  <style>
    :root {
      --bg: #f7f2e8;
      --card: #fffaf0;
      --ink: #2d2a26;
      --accent: #8b5e34;
      --green: #3c8d57;
      --red: #d62828;
      --line: #d8c7aa;
      --selected: #f7b731;
      
      --task: #8b3a2e;
      --task-hover: #a04636;
      --task-active: #5e241c;

      --solution: #3c8d57;
      --solution-hover: #4fa36a;

      --bg-main: #f3e4e1;
--bg-gradient-top: #f7ebe8;
--bg-gradient-bottom: #ead3cd;

      --panel-bg: #f6e9e6;
--panel-border: #c89b91;
--panel-inner: rgba(255,255,255,0.6);
    }

    * { box-sizing: border-box; }

    body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: radial-gradient(circle at top, var(--bg-gradient-top), var(--bg-gradient-bottom));
  color: var(--ink);
  min-height: 100vh;
  padding: 24px;
}

    h1 {
      text-align: center;
      margin: 0 0 8px;
      font-size: 32px;
    }

    .subtitle {
      text-align: center;
      margin-bottom: 22px;
      font-size: 17px;
    }

    .app {
      max-width: 1200px;
      margin: 0 auto;
      display: grid;
      gap: 18px;
    }

    .task-switcher {
      background: white;
      border: 2px solid var(--line);
      border-radius: 18px;
      padding: 14px;
      box-shadow: 0 8px 20px rgba(0,0,0,.08);
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
    }

      button {
  border: none;
  border-radius: 12px;
  padding: 11px 14px;
  color: white;
  font-weight: bold;
  font-size: 15px;
  cursor: pointer;
  box-shadow: 0 4px 10px rgba(0,0,0,.12);
  transition: all 0.15s ease;
}

.task-btn {
  background: var(--task);
}

    .task-btn.active-task {
  background: var(--task-active);
}

    .solution-btn {
  background: var(--solution);
}

.solution-btn:hover {
  background: var(--solution-hover);
}

    .reset-btn {
  background: #6c757d;
}

.task-btn:hover {
  background: var(--task-hover);
}
    
.task-switcher button:hover {
  background: var(--task-hover);
}
    
   .task-switcher button.active-task {
  background: var(--task-active);
  transform: scale(1.05);
  box-shadow: 0 0 0 4px rgba(139, 58, 46, 0.25);
}

    .solution-btn {
  background: var(--solution);
}

.solution-btn:hover {
  background: var(--solution-hover);
}

    button:hover { filter: brightness(1.08); }
    button:active { transform: scale(0.97); }

    .question-box {
      background: white;
      border: 2px solid var(--line);
      border-radius: 18px;
      padding: 16px;
      text-align: center;
      font-size: 22px;
      font-weight: bold;
      box-shadow: 0 8px 20px rgba(0,0,0,.06);
    }

    #questionText { white-space: pre-line; }

    .solution {
      margin-top: 10px;
      font-size: 20px;
      color: var(--green);
      display: none;
    }

    .solution.visible { display: block; }

    .equation-wrap {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      gap: 18px;
      align-items: stretch;
    }

    .side {
  background: var(--panel-bg);
  border: 3px solid var(--panel-border);
  border-radius: 22px;
  min-height: 360px;
  padding: 16px;
  box-shadow:
    inset 0 0 0 4px var(--panel-inner),
    0 8px 20px rgba(0,0,0,.08);
  position: relative;
  cursor: pointer;
  transition: all 0.2s ease;
}

    .side:active {
  transform: scale(0.98);
  background: #f2ddd8;
}

    .side.return-target {
  outline: 5px solid var(--task-active);
  outline-offset: 4px;
}

    .value-info {
      text-align: center;
      font-size: 15px;
      margin-bottom: 14px;
      color: #66584a;
    }

    .items {
      min-height: 250px;
      border: 2px dashed #cdbb9f;
      border-radius: 16px;
      padding: 14px;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-content: flex-start;
      background: rgba(255,255,255,.45);
    }

    .equals {
      display: flex;
      align-items: center;
      justify-content: center;
      min-width: 26px;
      position: relative;
    }

    .equals::before {
      content: "";
      width: 9px;
      height: 330px;
      background: var(--green);
      border-radius: 99px;
      display: block;
      transition: background 0.2s ease;
    }

    .equals.equal::before { background: var(--green); }
    .equals.not-equal::before { background: var(--red); }

    @keyframes flashRed {
      0% { background: var(--red); }
      50% { background: #ff6b6b; }
      100% { background: var(--red); }
    }

    .equals.flash::before {
      animation: flashRed 0.4s ease;
    }

    .match {
      width: 20px;
      height: 100px;
      background: url("match.png") center/contain no-repeat;
      cursor: pointer;
      margin: 4px;
      transition: transform 0.15s ease, opacity 0.15s ease;
    }

    .box {
      width: 150px;
      height: 100px;
      background: url("box.png") center/contain no-repeat;
      cursor: pointer;
      margin: 4px;
      transition: transform 0.15s ease, opacity 0.15s ease;
    }

    .match:active,
    .box:active {
      transform: scale(0.94);
    }

    .pop-out {
      animation: popOut 0.22s ease forwards;
    }

    @keyframes popOut {
      0% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.18); opacity: 0.85; }
      100% { transform: scale(0.2); opacity: 0; }
    }

    .pop-in {
      animation: popIn 0.25s ease;
    }

    @keyframes popIn {
      0% { transform: scale(0.2); opacity: 0; }
      70% { transform: scale(1.14); opacity: 1; }
      100% { transform: scale(1); opacity: 1; }
    }

    .trash {
      background: white;
      border: 3px dashed #b6a58e;
      border-radius: 18px;
      padding: 18px;
      min-height: 155px;
      text-align: center;
      font-weight: bold;
      font-size: 18px;
      color: #756653;
      box-shadow: 0 8px 20px rgba(0,0,0,.06);
    }

    .trash-title { margin-bottom: 4px; }

    .return-hint {
      margin-top: 8px;
      color: var(--accent);
      font-size: 16px;
      display: none;
    }

    .return-hint.visible { display: block; }

    .removed-items {
      margin-top: 14px;
      min-height: 80px;
      border-top: 2px solid #eadfce;
      padding-top: 14px;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center;
      align-items: flex-start;
    }

    .removed-items .selected {
  outline: 5px solid var(--task-active);
  outline-offset: 5px;
  border-radius: 12px;
  transform: scale(1.05);
  box-shadow: 0 0 0 4px rgba(139, 58, 46, 0.18);
}

    @media (max-width: 850px) {
      body { padding: 12px; }

      h1 { font-size: 26px; }

      .equation-wrap {
        grid-template-columns: 1fr;
      }

      .equals {
        min-height: 44px;
      }

      .equals::before {
        width: 330px;
        max-width: 85vw;
        height: 9px;
      }

      .side {
        min-height: 260px;
      }

      .items {
  min-height: 250px;
  border: 2px dashed #cdbb9f;
  border-radius: 16px;
  padding: 14px;
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
  align-content: flex-start;
  background: white;
}
    }
  </style>
</head>

<body>
  <h1>Knack die Box</h1>
  <div class="subtitle">Tippe auf Streichhölzer oder Boxen, um sie unten abzulegen.</div>

  <main class="app">
    <section class="task-switcher">
      <button class="task-btn" id="taskButton1" onclick="loadPreset(1)">Aufgabe 1</button>
<button class="task-btn" id="taskButton2" onclick="loadPreset(2)">Aufgabe 2</button>
<button class="task-btn" id="taskButton3" onclick="loadPreset(3)">Aufgabe 3</button>
<button class="task-btn" id="taskButton4" onclick="loadPreset(4)">Aufgabe 4</button>
<button class="task-btn" id="taskButton5" onclick="loadPreset(5)">Aufgabe 5</button>

<button class="reset-btn" onclick="resetTask()">Zurücksetzen</button>
<button class="solution-btn" onclick="toggleSolution()">Lösung anzeigen</button>
    </section>

    <section class="question-box">
      <div id="questionText"></div>
      <div id="solution" class="solution"></div>
    </section>

    <section class="equation-wrap">
      <div class="side" id="leftSide" data-side="left">
        <div class="value-info" id="leftInfo"></div>
        <div class="items" id="leftItems"></div>
      </div>

      <div class="equals"></div>

      <div class="side" id="rightSide" data-side="right">
        <div class="value-info" id="rightInfo"></div>
        <div class="items" id="rightItems"></div>
      </div>
    </section>

    <section id="trash" class="trash">
      <div class="trash-title">Ablage</div>
      <small>Tippe oben auf ein Teil, um es hier abzulegen.</small>
      <div id="returnHint" class="return-hint">Jetzt links oder rechts antippen, um das markierte Teil zurückzulegen.</div>
      <div id="removedItems" class="removed-items"></div>
    </section>
  </main>

  <script src="aufgaben.js"></script>
  <script src="arbeitsanweisung.js"></script>

  <script>
    let task = { leftBoxes: 1, leftMatches: 3, rightBoxes: 0, rightMatches: 7, boxValue: 4 };
    let state = structuredClone(task);
    let removedItems = [];
    let selectedRemovedIndex = null;
    let lastStateEqual = true;

    function calculateBoxValue(t) {
      const boxDifference = t.leftBoxes - t.rightBoxes;
      const matchDifference = t.rightMatches - t.leftMatches;

      if (boxDifference === 0) return null;

      const value = matchDifference / boxDifference;
      return Number.isInteger(value) && value >= 0 ? value : null;
    }

    function loadTask(newTask) {
      task = structuredClone(newTask);
      task.boxValue = calculateBoxValue(task);
      selectedRemovedIndex = null;
      resetTask();
    }

    function resetTask() {
      state = structuredClone(task);
      removedItems = [];
      selectedRemovedIndex = null;
      lastStateEqual = true;
      render();
      updateReturnHint();
    }

    function loadPreset(number) {
  if (typeof aufgaben === "undefined" || !aufgaben[number]) {
    alert("Aufgabe " + number + " wurde in aufgaben.js nicht gefunden.");
    return;
  }

  loadTask(aufgaben[number]);
  markActiveTaskButton(number);
}

function markActiveTaskButton(number) {
  document.querySelectorAll(".task-switcher button").forEach(button => {
    button.classList.remove("active-task");
  });

  const activeButton = document.getElementById("taskButton" + number);
  if (activeButton) {
    activeButton.classList.add("active-task");
  }
}

    function render() {
      renderSide("left");
      renderSide("right");
      renderRemovedItems();
      checkEquality();
      updateSolution(false);
      updateReturnHint();
    }

    function renderSide(side) {
      const container = document.getElementById(side + "Items");
      container.innerHTML = "";

      const boxes = state[side + "Boxes"];
      const matches = state[side + "Matches"];

      for (let i = 0; i < boxes; i++) {
        container.appendChild(createItem("box", side));
      }

      for (let i = 0; i < matches; i++) {
        container.appendChild(createItem("match", side));
      }

      document.getElementById(side + "Info").textContent =
        `${boxes} Box(en) und ${matches} Streichholz/Streichhölzer`;
    }

    function createItem(type, side) {
      const el = document.createElement("div");
      el.className = type + " pop-in";
      el.setAttribute("role", "button");
      el.setAttribute("aria-label", type === "box" ? "Box entfernen" : "Streichholz entfernen");

      el.addEventListener("click", (event) => {
        event.stopPropagation();

        el.classList.remove("pop-in");
        el.classList.add("pop-out");

        setTimeout(() => {
          removeOne(type, side);
        }, 180);
      });

      return el;
    }

    function removeOne(type, side) {
      const key = side + (type === "box" ? "Boxes" : "Matches");

      if (state[key] > 0) {
        state[key]--;
        removedItems.push({ type, fromSide: side });
        selectedRemovedIndex = null;
        render();
      }
    }

    function renderRemovedItems() {
      const container = document.getElementById("removedItems");
      container.innerHTML = "";

      removedItems.forEach((item, index) => {
        const el = document.createElement("div");
        el.className = item.type + " pop-in";

        if (index === selectedRemovedIndex) {
          el.classList.add("selected");
        }

        el.setAttribute("role", "button");
        el.setAttribute("aria-label", item.type === "box" ? "Box auswählen" : "Streichholz auswählen");

        el.addEventListener("click", (event) => {
          event.stopPropagation();
          selectedRemovedIndex = selectedRemovedIndex === index ? null : index;
          render();
        });

        container.appendChild(el);
      });
    }

    function returnSelectedItem(targetSide) {
      if (selectedRemovedIndex === null) return;

      const item = removedItems[selectedRemovedIndex];
      if (!item) return;

      const key = targetSide + (item.type === "box" ? "Boxes" : "Matches");
      state[key]++;

      removedItems.splice(selectedRemovedIndex, 1);
      selectedRemovedIndex = null;
      render();
    }

    document.getElementById("leftSide").addEventListener("click", () => returnSelectedItem("left"));
    document.getElementById("rightSide").addEventListener("click", () => returnSelectedItem("right"));

    function updateReturnHint() {
      const hasSelection = selectedRemovedIndex !== null;
      document.getElementById("returnHint").classList.toggle("visible", hasSelection);
      document.getElementById("leftSide").classList.toggle("return-target", hasSelection);
      document.getElementById("rightSide").classList.toggle("return-target", hasSelection);
    }

    function checkEquality() {
      const left = getValue("left");
      const right = getValue("right");
      const isEqual = left === right;

      const equalsEl = document.querySelector(".equals");
      equalsEl.classList.remove("equal", "not-equal");
      equalsEl.classList.add(isEqual ? "equal" : "not-equal");

      if (lastStateEqual && !isEqual) {
        equalsEl.classList.add("flash");
        setTimeout(() => equalsEl.classList.remove("flash"), 400);
      }

      lastStateEqual = isEqual;
    }

    function getValue(side) {
      if (task.boxValue === null) return NaN;
      return state[side + "Boxes"] * task.boxValue + state[side + "Matches"];
    }

    function toggleSolution() {
      const solution = document.getElementById("solution");
      solution.classList.toggle("visible");
      updateSolution(solution.classList.contains("visible"));
    }

    function updateSolution(forceVisible) {
      const solution = document.getElementById("solution");

      if (!forceVisible && !solution.classList.contains("visible")) return;

      solution.textContent = task.boxValue === null
        ? "Diese Aufgabe hat keine eindeutige positive ganze Lösung."
        : `Eine Box enthält ${task.boxValue} Streichhölzer.`;
    }

    document.getElementById("questionText").innerText =
      typeof instructionText !== "undefined"
        ? instructionText
        : "Wie viele Streichhölzer befinden sich in einer Box?";

    loadPreset(1);
  </script>
</body>
</html>
